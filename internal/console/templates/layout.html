{{define "layout"}}<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{.Title}} - picapica-nest</title>
    <link rel="stylesheet" href="/static/pico.min.css">
    <script src="/static/htmx.min.js"></script>
    <style>
        .report-layout { display: grid; grid-template-columns: 260px 1fr; gap: 1rem; }
        .report-list { max-height: 70vh; overflow-y: auto; }
        .report-list a { display: block; padding: 0.25rem 0.5rem; text-decoration: none; font-size: 0.9rem; }
        .report-list a[aria-current="page"] { font-weight: bold; }
        .report-content h1 { font-size: 1.5rem; }
        .report-content h2 { font-size: 1.25rem; }
        .report-content h3 { font-size: 1.1rem; }
        .tab-group { display: flex; gap: 0.4rem; margin-bottom: 1rem; }
        .tab-group a {
            display: inline-block;
            padding: 0.25rem 1rem;
            border-radius: 0.25rem;
            text-decoration: none;
            border: 1px solid var(--pico-primary);
            color: var(--pico-primary);
            cursor: pointer;
            font-size: 0.9rem;
        }
        .tab-group a[aria-current="true"] {
            background-color: var(--pico-primary);
            color: var(--pico-primary-inverse);
        }
        nav [aria-current="page"] {
            font-weight: bold;
            border-bottom: 2px solid var(--pico-primary);
        }
        td.num { text-align: right; font-variant-numeric: tabular-nums; }
        .calendar { padding: 0.5rem; }
        .calendar-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        .calendar-nav a {
            text-decoration: none;
            padding: 0.25rem 0.5rem;
            color: var(--pico-primary);
            font-size: 1.2rem;
        }
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            text-align: center;
        }
        .calendar-header {
            font-size: 0.75rem;
            font-weight: bold;
            padding: 0.25rem;
            color: var(--pico-muted-color);
        }
        .calendar-cell {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            border-radius: 0.25rem;
        }
        .calendar-cell.empty { visibility: hidden; }
        .calendar-cell.has-report {
            background-color: color-mix(in srgb, var(--pico-primary) 15%, transparent);
            color: var(--pico-primary);
            cursor: pointer;
            text-decoration: none;
            font-weight: 600;
            padding: 0;
            margin: 0;
            min-width: 0;
        }
        .calendar-cell.has-report:hover {
            background-color: color-mix(in srgb, var(--pico-primary) 30%, transparent);
        }
        .calendar-cell.selected {
            background-color: var(--pico-primary) !important;
            color: var(--pico-primary-inverse) !important;
        }
    </style>
</head>
<body>
    <header class="container">
        <nav>
            <ul><li><strong>picapica-nest</strong></li></ul>
            <ul>
                <li><a href="/dashboard" {{if eq .Active "dashboard"}}aria-current="page"{{end}}>ダッシュボード</a></li>
                <li><a href="/hindsight" {{if eq .Active "hindsight"}}aria-current="page"{{end}}>Hindsight</a></li>
                <li><a href="/conversations" {{if eq .Active "conversations"}}aria-current="page"{{end}}>会話ログ</a></li>
                <li><a href="/workspace" {{if eq .Active "workspace"}}aria-current="page"{{end}}>ワークスペース</a></li>
                <li><a href="/usage" {{if eq .Active "usage"}}aria-current="page"{{end}}>Usage</a></li>
                <li><a href="/logs" {{if eq .Active "logs"}}aria-current="page"{{end}}>ログ</a></li>
                <li><a href="https://github.com/ameyamatmk/picapica-nest" target="_blank" role="button" class="outline" style="padding: 0.25rem 0.5rem; font-size: 0.85rem;" title="GitHub"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="vertical-align: middle;"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg></a></li>
                <li><a href="#" id="theme-toggle" role="button" class="outline" style="padding: 0.25rem 0.5rem; font-size: 0.85rem;" onclick="toggleTheme(); return false;">🌙</a></li>
            </ul>
        </nav>
    </header>
    <main class="container">
        {{template "content" .}}
    </main>
    <script>
        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        }
        function toggleTheme() {
            var current = document.documentElement.getAttribute('data-theme');
            var next = current === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        }
        (function() {
            var saved = localStorage.getItem('theme');
            if (!saved) {
                saved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            applyTheme(saved);
        })();
    </script>
</body>
</html>{{end}}
