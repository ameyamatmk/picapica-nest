{{define "content"}}
<style>
    .chat-message { margin-bottom: 0.75rem; }
    .chat-in .chat-bubble {
        background: color-mix(in srgb, var(--pico-primary) 10%, transparent);
        padding: 0.5rem 0.75rem; border-radius: 0.5rem;
    }
    .chat-out .chat-bubble {
        background: var(--pico-card-background-color);
        padding: 0.5rem 0.75rem; border-radius: 0.5rem;
    }
    .chat-meta { font-size: 0.75rem; color: var(--pico-muted-color); margin-bottom: 0.25rem; }
    .chat-bubble { white-space: pre-wrap; word-break: break-word; }
</style>
<h2>会話ログ</h2>
<div id="conversations-area">
    {{template "conversations_content" .}}
</div>
{{end}}
