{{define "content"}}
<h2>API Usage</h2>
<div class="tab-group">
    {{range .Periods}}
    <a href="/usage?period={{.Value}}" {{if .Active}}aria-current="true"{{end}}>{{.Label}}</a>
    {{end}}
</div>
{{if .Error}}
<p role="alert">{{.Error}}</p>
{{else if not .Days}}
<p><em>データがありません</em></p>
{{else}}
<p><strong>期間合計:</strong> {{formatUSD .TotalCostUSD}}{{if .TotalCostJPY}}（約 {{formatJPY .TotalCostJPY}}）{{end}}</p>
<canvas id="usage-chart" style="max-height: 350px; margin-bottom: 1.5rem;"></canvas>
<figure>
<table>
    <thead>
        <tr>
            <th>日付</th>
            <th>呼び出し回数</th>
            <th>Prompt Tokens</th>
            <th>Completion Tokens</th>
            <th>Total Tokens</th>
            <th>コスト (USD)</th>
            <th>コスト (JPY)</th>
            <th>エラー数</th>
            <th>平均レイテンシ</th>
        </tr>
    </thead>
    <tbody>
        {{range .Days}}
        <tr>
            <td>{{.Date}}</td>
            <td class="num">{{comma .CallCount}}</td>
            <td class="num">{{comma .PromptTokens}}</td>
            <td class="num">{{comma .CompletionTokens}}</td>
            <td class="num">{{comma .TotalTokens}}</td>
            <td class="num">{{formatUSD .CostUSD}}</td>
            <td class="num">{{formatJPY .CostJPY}}</td>
            <td class="num">{{.ErrorCount}}</td>
            <td class="num">{{comma .AvgLatencyMs}}ms</td>
        </tr>
        {{end}}
    </tbody>
</table>
</figure>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script>
(function() {
    var days = [
        {{range .Days}}{date:"{{.Date}}",prompt:{{.PromptTokens}},completion:{{.CompletionTokens}},total:{{.TotalTokens}}},
        {{end}}
    ].reverse();

    var style = getComputedStyle(document.documentElement);
    var textColor = style.getPropertyValue('--pico-color').trim();
    var mutedColor = style.getPropertyValue('--pico-muted-color').trim();
    var borderColor = style.getPropertyValue('--pico-muted-border-color').trim();

    new Chart(document.getElementById('usage-chart'), {
        type: 'line',
        data: {
            labels: days.map(function(d) { return d.date; }),
            datasets: [
                {
                    label: 'Total Tokens',
                    data: days.map(function(d) { return d.total; }),
                    borderColor: style.getPropertyValue('--pico-primary').trim(),
                    backgroundColor: 'transparent',
                    tension: 0.3,
                    borderWidth: 2
                },
                {
                    label: 'Prompt Tokens',
                    data: days.map(function(d) { return d.prompt; }),
                    borderColor: style.getPropertyValue('--pico-secondary').trim(),
                    backgroundColor: 'transparent',
                    tension: 0.3,
                    borderWidth: 2
                },
                {
                    label: 'Completion Tokens',
                    data: days.map(function(d) { return d.completion; }),
                    borderColor: '#e67e22',
                    backgroundColor: 'transparent',
                    tension: 0.3,
                    borderWidth: 2
                }
            ]
        },
        options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            plugins: {
                legend: { labels: { color: textColor } }
            },
            scales: {
                x: {
                    ticks: { color: mutedColor },
                    grid: { color: borderColor }
                },
                y: {
                    ticks: { color: mutedColor },
                    grid: { color: borderColor }
                }
            }
        }
    });
})();
</script>
{{end}}
{{end}}
