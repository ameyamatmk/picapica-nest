{{define "content"}}
<h2>Hindsight</h2>
<div class="tab-group">
    <a href="/hindsight?tab=daily"
       {{if eq .Tab "daily"}}aria-current="true"{{end}}>日次</a>
    <a href="/hindsight?tab=weekly"
       {{if eq .Tab "weekly"}}aria-current="true"{{end}}>週次</a>
    <a href="/hindsight?tab=monthly"
       {{if eq .Tab "monthly"}}aria-current="true"{{end}}>月次</a>
</div>

<div id="report-area">
    {{template "hindsight_content" .}}
</div>
{{end}}
